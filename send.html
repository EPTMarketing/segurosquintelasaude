<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedido enviado</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f7;font-family:Montserrat,Arial,sans-serif;color:#1f1f1f;padding:24px;box-sizing:border-box;text-align:center}
    .card{max-width:560px;background:#fff;border-radius:18px;padding:42px 28px;box-shadow:0 12px 35px rgba(0,0,0,.08)}
    h1{margin:0 0 14px;font-size:30px;line-height:1.2}
    p{margin:0 0 26px;font-size:17px;line-height:1.5}
    a{display:inline-block;background:#1f1f1f;color:#fff;text-decoration:none;border-radius:999px;padding:13px 24px;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <h1>Pedido enviado com sucesso</h1>
    <p>Obrigado. Recebemos o seu pedido e entraremos em contacto brevemente.</p>
    <a href="/">Voltar à página inicial</a>
  </main>
</body>
</html>
